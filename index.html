<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Fetching</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-indigo-950">
    <div class="flex justify-center items-center font-sans flex-col">
        <div class="h-[70vmin] w-full bg-indigo-900 flex justify-center items-center flex-col gap-4">
            <h1 class="text-blue-300 text-2xl sm:text-4xl">Get Your QUOTE 🥷🏻 </h1>
            <div class="h-[40vmin] w-4/5 bg-fuchsia-100 rounded-3xl">
                <p class="quote m-3"></p>
                <p class="quoteAuthor m-3"></p>
            </div>
            <div class="border-2 border-amber-600 rounded-xl bg-cyan-100">
                <button class="bg-emerald-600 text-amber-50 h-[5vmin] w-[25vmin] rounded-2xl m-3" onclick="getQuote()" onselect="getQuote()">New Quote</button>
                <button class="bg-emerald-600 text-amber-50 h-[5vmin] w-[25vmin] rounded-2xl m-3" id="copyBtn" onclick="copyQuote()" onselect="copyQuote()">Copy</button>
            </div>
        </div>
    </div>
    <script>
        let url = 'https://api.quotable.io/random';
        async function getQuote() {
            let responce = await fetch(url);
            console.log(responce);
            let data = await responce.json();
            console.log(data);
            let quoteContent = data.content;
            let author = data.author;
            let quoteOP = document.querySelector('.quote');
            let authorOP = document.querySelector('.quoteAuthor');
            quoteOP.innerHTML = 'Loading...';
            authorOP.innerHTML='';
            setTimeout(function(){
                quoteOP.innerHTML= quoteContent;
                authorOP.innerHTML = author;
            },2000);

        }

        function copyQuote() {
            let quoteContent = document.querySelector('.quote').innerText;
            let author = document.querySelector('.quoteAuthor').innerText;
            
            if (!quoteContent) return; // Don't copy if there's no quote
            
            let textToCopy = `"${quoteContent}" - ${author}`;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                let copyBtn = document.getElementById('copyBtn');
                let originalText = copyBtn.innerText;
                copyBtn.innerText = 'Copied!';
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }
    </script>
</body>
</html>
